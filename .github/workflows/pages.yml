name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build
        env:
          VITE_BASE_PATH: /blipcreativeworks/
          VITE_ROUTER_MODE: hash
          VITE_PUBLIC_APP_URL: https://iriszimmerfrau-collab.github.io/blipcreativeworks
          VITE_FIREBASE_API_KEY: AIzaSyAyuWfAxwM4d6WCldaxUfd57h-iyRv12e4
          VITE_FIREBASE_AUTH_DOMAIN: heyo-6d856.firebaseapp.com
          VITE_FIREBASE_DATABASE_URL: https://heyo-6d856-default-rtdb.firebaseio.com
          VITE_FIREBASE_PROJECT_ID: heyo-6d856
          VITE_FIREBASE_STORAGE_BUCKET: heyo-6d856.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "977655764179"
          VITE_FIREBASE_APP_ID: 1:977655764179:web:7d7d5077b90dd3b0d03026
          VITE_FIREBASE_MEASUREMENT_ID: G-XK2FEXB8BM
          VITE_ENABLE_APP_CHECK: "false"
          VITE_BLIP_URL: https://gsia.blipcreativeworks.store/
          VITE_CHROMONNO_URL: https://payhip.com/Chromonno
          VITE_OFFICIAL_EMAIL: ceo@blipcreativeworks.store

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
